name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Compile TypeScript
        run: npm run compile

      - name: Validate extension structure
        run: |
          echo "Checking extension structure..."
          ls -la dist/
          echo "---"
          echo "Checking package.json exports..."
          cat package.json | grep -A2 '"main"'
          cat package.json | grep -A5 '"engines"'

  package:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Compile extension
        run: npm run compile

      - name: Package VSIX
        id: package
        run: |
          npm install -g @vscode/vsce
          vsce package --allow-missing-repository-url -o dist/raul-vscode
          echo "vsix_path=dist/raul-vscode.vsix" >> $GITHUB_OUTPUT
          echo "vsix_name=raul-vscode-$(git describe --tags).vsix" >> $GITHUB_OUTPUT

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: raul-vscode
          path: dist/raul-vscode.vsix

      - name: List artifacts
        run: ls -la dist/
